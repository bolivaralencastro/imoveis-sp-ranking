<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ranking de Imóveis para Aluguel em São Paulo</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --bg: #f4f6f7;
      --surface: #ffffff;
      --surface-soft: #eef3f3;
      --text: #172124;
      --muted: #66777b;
      --line: #d8e1e3;
      --accent: #0f766e;
      --accent-soft: #dff7ed;
      --warn: #a15c07;
      --warn-soft: #fff4d6;
      --bad: #b42318;
      --bad-soft: #fee4e2;
      --shadow: 0 14px 34px rgba(24, 33, 36, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.42;
      overflow: hidden;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      padding: 8px 12px;
      font-weight: 650;
    }

    button:hover {
      border-color: #9fb1b5;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }

    button.ghost {
      background: transparent;
    }

    button.danger {
      color: var(--bad);
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    a:hover {
      text-decoration: underline;
    }

    input,
    select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fbfcfc;
      color: var(--text);
      padding: 8px 10px;
    }

    label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .app {
      width: 100vw;
      height: 100vh;
      padding: 0;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .icon-button {
      width: 32px;
      min-width: 32px;
      height: 32px !important;
      min-height: 32px !important;
      padding: 0;
      display: inline-grid;
      place-items: center;
      font-size: 18px;
      border-radius: 7px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      text-decoration: none;
      aspect-ratio: 1;
    }

    .icon-button:hover {
      border-color: #9fb1b5;
      background: var(--surface-soft);
    }

    .workspace {
      display: grid;
      grid-template-columns: 430px minmax(0, 1fr);
      height: 100vh;
      width: 100vw;
      align-items: stretch;
    }

    .panel {
      position: relative;
      background: var(--surface);
      border: 0;
      border-right: 1px solid var(--line);
      border-radius: 0;
      box-shadow: none;
      overflow: hidden;
    }

    .panel-body {
      padding: 14px;
    }

    .filters {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: #fafcfc;
    }

    .sort-button {
      flex: 1;
      min-width: 0;
      background: #ffffff;
      color: var(--muted);
      font-size: 10px;
    }

    .sort-button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }

    .field {
      display: grid;
      gap: 5px;
    }

    .field.compact label {
      display: none;
    }

    .rank-list {
      display: grid;
      gap: 8px;
      height: calc(100vh - 84px);
      overflow: auto;
      padding: 12px;
    }

    .home-card {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      text-align: left;
      padding: 10px;
      min-height: 76px;
    }

    .card-thumb {
      width: 56px;
      height: 56px;
      border-radius: 6px;
      object-fit: cover;
      background: var(--surface-soft);
      align-self: center;
      flex-shrink: 0;
    }

    .home-card.comparing {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 2px var(--accent);
    }

    .home-card:hover,
    .home-card.active {
      border-color: var(--accent);
      background: #f6fbfa;
    }

    .home-card.active {
      box-shadow: inset 3px 0 0 var(--accent);
    }

    .rank-number {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border-radius: 999px;
      background: var(--surface-soft);
      font-weight: 850;
    }

    .compare-bar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 -12px 30px rgba(24, 33, 36, 0.08);
      z-index: 2;
    }

    .compare-bar.visible {
      display: flex;
    }

    .rank-list.has-compare {
      padding-bottom: 68px;
    }

    .compare-bar span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    .compare-bar button {
      min-height: 34px;
      padding: 7px 10px;
    }

    .card-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .card-title strong {
      display: block;
      font-size: 14px;
      line-height: 1.25;
    }

    .card-title span {
      color: var(--muted);
      font-size: 12px;
    }

    .score {
      display: inline-flex;
      min-width: 48px;
      justify-content: center;
      border-radius: 999px;
      padding: 3px 8px;
      background: var(--accent-soft);
      color: #067647;
      font-weight: 850;
    }

    .score.mid {
      background: var(--warn-soft);
      color: var(--warn);
    }

    .score.low {
      background: var(--bad-soft);
      color: var(--bad);
    }

    .card-facts {
      display: flex;
      align-items: center;
      gap: 0;
      width: 100%;
    }

    .fact {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      flex: 1;
      min-width: 0;
      border-left: 1px solid var(--line);
    }

    .fact:first-child {
      border-left: 0;
    }

    .fact svg {
      opacity: 0.55;
      flex-shrink: 0;
    }

    .fact strong {
      display: block;
      font-size: 12px;
      text-align: center;
      line-height: 1.2;
    }

    .fact span {
      color: var(--muted);
      font-size: 10px;
      white-space: nowrap;
      text-align: center;
    }

    /* Card tooltip */
    .card-tooltip {
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      background: rgba(23, 33, 36, 0.92);
      color: #ffffff;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 12px;
      line-height: 1.6;
      white-space: nowrap;
      box-shadow: 0 8px 24px rgba(0,0,0,0.22);
      opacity: 0;
      transition: opacity 100ms ease;
    }

    .card-tooltip.visible {
      opacity: 1;
    }

    .card-tooltip strong {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .delta-positive {
      color: var(--bad);
    }

    .delta-negative {
      color: var(--accent);
    }

    .cost-delta {
      font-size: 10px;
      font-weight: 750;
      margin-left: 5px;
      vertical-align: middle;
      opacity: 0.85;
    }

    .detail-list {
      display: grid;
      border-top: 1px solid var(--line);
      margin-top: -1px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: baseline;
      min-height: 36px;
      padding: 8px 2px;
      border-bottom: 1px solid var(--line);
    }

    .detail-row span {
      color: var(--muted);
      font-size: 13px;
    }

    .detail-row strong {
      color: var(--text);
      font-size: 14px;
      text-align: right;
    }

    .detail-row.notes {
      display: block;
    }

    .detail-row.notes strong {
      display: block;
      margin-top: 4px;
      text-align: left;
      font-weight: 550;
      line-height: 1.45;
    }

    .detail-actions {
      margin-top: 10px;
    }

    .detail-actions a {
      display: inline-flex;
      min-height: 34px;
      align-items: center;
      justify-content: center;
      border-radius: 7px;
      background: var(--accent);
      color: #ffffff;
      padding: 7px 10px;
      text-decoration: none;
      font-size: 13px;
    }

    .map-panel {
      position: relative;
      min-width: 0;
      height: 100vh;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .map-tile-bw {
      filter: grayscale(1) contrast(1.08) brightness(1.04);
    }

    .map-toolbar {
      position: absolute;
      z-index: 500;
      top: 12px;
      right: 12px;
      display: flex;
      gap: 8px;
    }

    .route-info-badge {
      position: absolute;
      z-index: 500;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      font-size: 13px;
      font-weight: 750;
      white-space: nowrap;
      pointer-events: none;
    }

    .route-badge-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-right: 2px;
    }

    .route-badge-sep {
      color: var(--line);
      font-size: 16px;
    }

    .route-badge-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .route-badge-item.drive {
      color: #0f766e;
    }

    .route-badge-item.drive-return {
      color: #c2620a;
    }

    .route-badge-dir {
      font-size: 10px;
      font-weight: 700;
      opacity: 0.65;
      letter-spacing: 0.02em;
    }

    .route-badge-item.walk {
      color: #2563eb;
    }

    .map-pill {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.94);
      padding: 8px 12px;
      box-shadow: var(--shadow);
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    .pin {
      width: 28px;
      height: 28px;
      border: 2px solid #ffffff;
      border-radius: 50% 50% 50% 0;
      background: var(--accent);
      color: #ffffff;
      box-shadow: 0 8px 18px rgba(23, 33, 36, 0.26);
      transform: rotate(-45deg);
      display: block;
      position: relative;
    }

    .pin::after {
      content: "";
      position: absolute;
      inset: 7px;
      border-radius: 999px;
      background: #ffffff;
    }

    .pin.mid {
      background: var(--warn);
      border-color: #ffffff;
    }

    .pin.mid::after {
      background: #ffffff;
    }

    .pin.low {
      background: var(--bad);
    }

    .pin.target {
      background: #172124;
      border-color: #ffffff;
    }



    .drawer-backdrop {
      position: fixed;
      inset: 0;
      z-index: 900;
      background: rgba(23, 33, 36, 0.28);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease;
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 901;
      width: min(460px, 100vw);
      height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--line);
      box-shadow: -24px 0 60px rgba(24, 33, 36, 0.18);
      transform: translateX(100%);
      transition: transform 180ms ease;
      overflow: auto;
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer-head {
      position: sticky;
      top: 0;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .drawer-head h2 {
      margin: 0;
      font-size: 16px;
      flex: 1;
      min-width: 0;
    }

    .drawer-head-actions {
      display: flex;
      gap: 4px;
      align-items: center;
      flex-shrink: 0;
    }

    .compare-dialog {
      width: min(1120px, calc(100vw - 28px));
      max-height: calc(100vh - 28px);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0;
      box-shadow: 0 24px 70px rgba(24, 33, 36, 0.24);
    }

    .compare-dialog::backdrop {
      background: rgba(23, 33, 36, 0.34);
    }

    .compare-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .compare-head strong {
      font-size: 16px;
    }

    .compare-grid {
      display: grid;
      grid-template-columns: repeat(var(--compare-cols, 2), minmax(190px, 1fr));
      gap: 0;
      overflow: auto;
    }

    .compare-card {
      min-width: 190px;
      border-right: 1px solid var(--line);
      background: #ffffff;
    }

    .compare-card:last-child {
      border-right: 0;
    }

    .compare-card img {
      width: 100%;
      aspect-ratio: 16 / 10;
      display: block;
      object-fit: cover;
      border-bottom: 1px solid var(--line);
      background: var(--surface-soft);
    }

    .compare-card h3 {
      margin: 0;
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.25;
      border-bottom: 1px solid var(--line);
    }

    .compare-card .detail-list {
      padding: 0 12px 12px;
    }

    .photo-slider {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 10;
      border-bottom: 1px solid var(--line);
      background: var(--surface-soft);
      overflow: hidden;
    }

    .photo-slider img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .photo-empty {
      height: 100%;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 13px;
    }

    .slider-button {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 38px;
      min-width: 38px;
      height: 38px;
      padding: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 8px 22px rgba(23, 33, 36, 0.18);
    }

    .slider-button.prev {
      left: 10px;
    }

    .slider-button.next {
      right: 10px;
    }

    .photo-count {
      position: absolute;
      right: 10px;
      bottom: 10px;
      border-radius: 999px;
      background: rgba(23, 33, 36, 0.78);
      color: #ffffff;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 750;
    }

    .hint {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .market-pin {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      background: #ffffff;
      border: 2px solid #7c3aed;
      border-radius: 50%;
      font-size: 15px;
      box-shadow: 0 4px 14px rgba(124, 58, 237, 0.35);
      line-height: 1;
    }

    #toggleMarkets {
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
      border-radius: 999px;
      font-size: 18px;
      width: 40px;
      min-width: 40px;
      padding: 0;
    }

    #toggleMarkets.active {
      background: #7c3aed;
      border-color: #7c3aed;
      color: #ffffff;
    }

    .empty {
      padding: 22px;
      color: var(--muted);
      text-align: center;
    }

    .file-input {
      display: none;
    }

    @media (max-width: 900px) {
      .workspace {
        grid-template-columns: 1fr;
        grid-template-rows: 48vh 52vh;
      }

      .panel {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .map-panel {
        height: 48vh;
        order: -1;
      }

      .rank-list {
        height: calc(52vh - 63px);
      }

    }

    @media (max-width: 560px) {
      .card-facts {
        grid-template-columns: 1fr;
      }

      .rank-list {
        height: calc(52vh - 112px);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="workspace">
      <section class="panel">
        <div class="filters" id="sortControls">
          <button class="sort-button active" type="button" data-sort="score">Ranking</button>
          <button class="sort-button" type="button" data-sort="totalCost">Valor</button>
          <button class="sort-button" type="button" data-sort="delta">Diferença</button>
          <button class="sort-button" type="button" data-sort="targetDistanceKm">Distância</button>
          <button class="sort-button" type="button" data-sort="area">m²</button>
        </div>
        <div id="cards" class="rank-list"></div>
        <div id="compareBar" class="compare-bar">
          <span id="compareCount">0 selecionados</span>
          <button id="openCompare" class="primary" type="button">Comparar</button>
        </div>
      </section>

      <section class="map-panel">
        <div id="map"></div>
        <div class="map-toolbar">
          <button id="toggleMarkets" class="icon-button" type="button" title="Exibir/esconder mercados">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          </button>
          <span id="mapCount" class="map-pill">0</span>
        </div>
      </section>

    </section>

    <div id="drawerBackdrop" class="drawer-backdrop"></div>
    <aside id="detailDrawer" class="drawer">
      <div class="drawer-head">
        <h2 id="detailTitle">Detalhes do imóvel</h2>
        <div class="drawer-head-actions">
          <a id="drawerExternalLink" class="icon-button" target="_blank" rel="noreferrer" title="Abrir anúncio no QuintoAndar" style="display:none;" aria-label="Abrir anúncio no QuintoAndar"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>
          <button id="closeDrawer" class="icon-button" type="button" title="Fechar">×</button>
        </div>
      </div>
      <div id="detailPanel" class="panel-body"></div>
    </aside>

    <dialog id="compareDialog" class="compare-dialog">
      <div class="compare-head">
        <strong>Comparativo</strong>
        <button id="closeCompare" class="icon-button" type="button" title="Fechar">×</button>
      </div>
      <div id="compareGrid" class="compare-grid"></div>
    </dialog>

  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>

                      },
                      {
                            "url": "https://www.quintoandar.com.br/img/med/893893736-930.48602150044503Sala.jpg",
                            "subtitle": "Sala",

    { name: "Pão de Açúcar", label: "Supermercado", lat: -23.592569, lng: -46.6771915 },
    { name: "Pão de Açúcar", label: "Supermercado", lat: -23.5958191, lng: -46.6768186 },
    { name: "Pão de Açúcar", label: "Supermercado", lat: -23.6009017, lng: -46.6786891 },
    { name: "Pão de Açúcar", label: "Supermercado", lat: -23.5663884, lng: -46.6648917 },
    { name: "Pão de Açúcar Minuto", label: "Conveniência", lat: -23.6081833, lng: -46.7077419 },
    { name: "St Marche", label: "Supermercado", lat: -23.6016028, lng: -46.6737803 },
    { name: "Super Natural", label: "Supermercado", lat: -23.5662924, lng: -46.6688603 },
    { name: "Supermercado Ferraz", label: "Supermercado", lat: -23.5850061, lng: -46.6853364 }
    ];

    function haversineKm(lat1, lng1, lat2, lng2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat/2) ** 2 + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLng/2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function nearestMarket(home) {
      if (!home.lat || !home.lng) return null;
      let best = null;
      for (const m of MARKETS_DATA) {
        const dist = haversineKm(home.lat, home.lng, m.lat, m.lng);
        if (!best || dist < best.dist) best = { name: m.name, dist };
      }
      return best;
    }

    let state = loadState();
    let selectedId = state.homes[0]?.id || null;
    let map;
    let markerLayer;
    let markersById = {};
    let marketLayer = null;
    let marketsVisible = false;
    let photoIndexes = {};
    let routeLayerDriving = null;
    let routeLayerWalking = null;
    let routeLayerDrivingReturn = null;
    let routeCache = {};
    let sortBy = "score";
    let selectedCompareIds = [];

    const money = new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL", maximumFractionDigits: 0 });
    const number = new Intl.NumberFormat("pt-BR", { maximumFractionDigits: 1 });

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : structuredClone(defaultState);
      } catch {
        return structuredClone(defaultState);
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function clean(value) {
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function totalCost(home) {
      return clean(home.rent) + clean(home.condo) + clean(home.iptu);
    }

    function currentDelta(home) {
      return totalCost(home) - CURRENT_HOME.monthlyCost;
    }

    function deltaLabel(home) {
      const delta = currentDelta(home);
      if (Math.abs(delta) < 1) return "igual";
      return `${delta > 0 ? "+" : "-"}${money.format(Math.abs(delta))}`;
    }

    function deltaClass(home) {
      const delta = currentDelta(home);
      if (delta > 0) return "delta-positive";
      if (delta < 0) return "delta-negative";
      return "";
    }

    function valuePerSqm(home) {
      return clean(home.area) > 0 ? totalCost(home) / clean(home.area) : 0;
    }

    function normalizeHigher(value, max) {
      if (!max) return 0.5;
      return Math.max(0, Math.min(1, value / max));
    }

    function normalizeLower(value, min, max) {
      if (!value) return 0.5;
      if (max === min) return 1;
      return 1 - ((value - min) / (max - min));
    }

    function clampScore(value) {
      return Math.max(0, Math.min(10, clean(value))) / 10;
    }

    function rankedHomes() {
      const totals = state.homes.map(totalCost).filter(Boolean);
      const values = state.homes.map(valuePerSqm).filter(Boolean);
      const distances = state.homes.map((home) => clean(home.targetDistanceKm)).filter(Boolean);
      const maxArea = Math.max(0, ...state.homes.map((home) => clean(home.area)));
      const maxBedrooms = Math.max(0, ...state.homes.map((home) => clean(home.bedrooms)));
      const maxBathrooms = Math.max(0, ...state.homes.map((home) => clean(home.bathrooms)));
      const maxParking = Math.max(0, ...state.homes.map((home) => clean(home.parking)));
      const minTotal = totals.length ? Math.min(...totals) : 0;
      const maxTotal = totals.length ? Math.max(...totals) : 0;
      const minValue = values.length ? Math.min(...values) : 0;
      const maxValue = values.length ? Math.max(...values) : 0;
      const minDistance = distances.length ? Math.min(...distances) : 0;
      const maxDistance = distances.length ? Math.max(...distances) : 0;

      return state.homes.map((home) => {
        const factors = {
          cost: normalizeLower(totalCost(home), minTotal, maxTotal),
          valuePerSqm: normalizeLower(valuePerSqm(home), minValue, maxValue),
          targetDistance: normalizeLower(clean(home.targetDistanceKm), minDistance, maxDistance),
          area: normalizeHigher(clean(home.area), maxArea),
          bedrooms: normalizeHigher(clean(home.bedrooms), maxBedrooms),
          bathrooms: normalizeHigher(clean(home.bathrooms), maxBathrooms),
          parking: normalizeHigher(clean(home.parking), maxParking),
          transit: clampScore(home.transit),
          safety: clampScore(home.safety),
          condition: clampScore(home.condition),
          lightNoise: clampScore(home.lightNoise)
        };
        const weightSum = Object.values(state.weights).reduce((sum, item) => sum + clean(item), 0) || 1;
        const score = Object.entries(factors).reduce((sum, [key, value]) => sum + value * clean(state.weights[key]), 0) / weightSum * 100;
        return { ...home, totalCost: totalCost(home), valuePerSqm: valuePerSqm(home), delta: currentDelta(home), score };
      }).sort(sortHomes);
    }

    function sortHomes(a, b) {
      if (sortBy === "totalCost" || sortBy === "targetDistanceKm" || sortBy === "delta") return a[sortBy] - b[sortBy];
      return b[sortBy] - a[sortBy];
    }

    function render() {
      const homes = rankedHomes();
      if (!homes.some((home) => home.id === selectedId)) selectedId = homes[0]?.id || state.homes[0]?.id || null;
      renderCards(homes);
      renderMap(homes);
      renderSortControls();
      renderCompareBar();
    }

    function renderSortControls() {
      document.querySelectorAll("[data-sort]").forEach((button) => {
        button.classList.toggle("active", button.dataset.sort === sortBy);
      });
    }

    function renderCards(homes) {
      const container = document.getElementById("cards");
      container.innerHTML = "";
      if (!homes.length) {
        container.innerHTML = '<div class="empty">Nenhum imóvel encontrado com os filtros atuais.</div>';
        return;
      }
      homes.forEach((home, index) => {
        const card = document.createElement("button");
        card.type = "button";
        const coverPhoto = home.photos?.find(p => p.cover)?.url || home.photos?.[0]?.url || "";
        card.className = `home-card ${home.id === selectedId ? "active" : ""} ${selectedCompareIds.includes(home.id) ? "comparing" : ""}`;
        const iconMoney = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`;
        const iconDist  = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 1 8 8c0 5.25-8 13-8 13S4 15.25 4 10a8 8 0 0 1 8-8z"/></svg>`;
        const iconArea  = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>`;
        const iconBed   = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9V5a1 1 0 0 1 1-1h18a1 1 0 0 1 1 1v4"/><path d="M2 9h20v10H2z"/><path d="M7 9V7a2 2 0 0 1 4 0v2"/></svg>`;
        card.innerHTML = `
          ${coverPhoto ? `<img class="card-thumb" src="${escapeAttr(coverPhoto)}" alt="">` : `<span class="card-thumb"></span>`}
          <span style="display:flex;flex-direction:column;justify-content:center;min-width:0;flex:1;">
            <span class="card-facts">
              <span class="fact" title="Custo total">${iconMoney}<strong>${money.format(home.totalCost)}</strong><span class="${deltaClass(home)}" style="font-size:10px;font-weight:750;">${deltaLabel(home)}</span></span>
              <span class="fact" title="Distância até Faria Lima">${iconDist}<strong>${number.format(home.targetDistanceKm)} km</strong></span>
              <span class="fact" title="Área">${iconArea}<strong>${home.area} m²</strong></span>
              <span class="fact" title="Quartos">${iconBed}<strong>${home.bedrooms}</strong></span>
            </span>
          </span>
        `;
        card.addEventListener("click", (e) => {
          if (e.shiftKey) {
            toggleCompare(home.id, !selectedCompareIds.includes(home.id));
            return;
          }
          selectedId = home.id;
          render();
          openDrawer(home);
        });
        card.addEventListener("mouseenter", (e) => { showMarkerPreview(home.id); showRoutes(home); showCardTooltip(home, e); });
        card.addEventListener("mousemove", (e) => { moveCardTooltip(e); });
        card.addEventListener("mouseleave", () => { hideMarkerPreview(home.id); clearRoutes(); hideCardTooltip(); });
        container.append(card);
      });
    }

    function toggleCompare(id, checked) {
      if (checked) {
        if (selectedCompareIds.length >= 4) {
          renderCards(rankedHomes());
          return;
        }
        if (!selectedCompareIds.includes(id)) selectedCompareIds.push(id);
      } else {
        selectedCompareIds = selectedCompareIds.filter((item) => item !== id);
      }
      renderCards(rankedHomes());
      renderCompareBar();
    }

    function renderCompareBar() {
      const bar = document.getElementById("compareBar");
      const count = selectedCompareIds.length;
      document.getElementById("compareCount").textContent = `${count}/4`;
      document.getElementById("openCompare").disabled = count === 0;
      bar.classList.toggle("visible", count > 0);
      document.getElementById("cards").classList.toggle("has-compare", count > 0);
    }

    function openCompareDialog() {
      const homes = rankedHomes().filter((home) => selectedCompareIds.includes(home.id));
      const grid = document.getElementById("compareGrid");
      grid.style.setProperty("--compare-cols", String(Math.max(homes.length, 1)));
      grid.innerHTML = homes.map(compareColumn).join("");
      document.getElementById("compareDialog").showModal();
    }

    function compareColumn(home) {
      const photo = home.photos?.[0]?.url || "";
      return `
        <article class="compare-card">
          ${photo ? `<img src="${escapeAttr(photo)}" alt="">` : ""}
          <h3>${escapeHtml(home.title)}</h3>
          <div class="detail-list">
            ${detailRow("Nota", Math.round(home.score))}
            ${detailRow("Total", money.format(home.totalCost))}
            ${detailRow("Vs atual", deltaLabel(home), deltaClass(home))}
            ${detailRow("Distância", `${number.format(home.targetDistanceKm)} km`)}
            ${detailRow("Área", `${number.format(home.area)} m²`)}
            ${detailRow("Quartos", home.bedrooms)}
            ${detailRow("Banheiros", home.bathrooms)}
            ${detailRow("Vagas", home.parking)}
            ${detailRow("Bairro", home.neighborhood)}
            ${detailRow("Aluguel", money.format(home.rent))}
            ${detailRow("Condomínio", money.format(home.condo))}
            ${detailRow("IPTU", money.format(home.iptu))}
          </div>
        </article>
      `;
    }

    function initMap() {
      if (map || !window.L) return;
      const target = state.target || defaultState.target;
      map = L.map("map", { zoomControl: false }).setView([target.lat, target.lng], 14);
      L.control.zoom({ position: "bottomright" }).addTo(map);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        className: "map-tile-bw",
        attribution: "&copy; OpenStreetMap"
      }).addTo(map);
      markerLayer = L.layerGroup().addTo(map);
      marketLayer = L.layerGroup();
    }

    function renderMarkets() {
      marketLayer.clearLayers();
      MARKETS_DATA.forEach(m => {
        const marker = L.marker([m.lat, m.lng], { icon: marketIcon() });
        marker.bindTooltip(`<strong>${escapeHtml(m.name)}</strong><br><span style="color:#888;font-size:11px">${m.label}</span>`, {
          direction: "top",
          offset: [0, -12],
          opacity: 1
        });
        marketLayer.addLayer(marker);
      });
    }

        function marketIcon() {
      return L.divIcon({
        className: "",
        html: `<span class="market-pin"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg></span>`,
        iconSize: [30, 30],
        iconAnchor: [15, 15]
      });
    }

    function toggleMarkets() {
      if (!map) return;
      marketsVisible = !marketsVisible;
      const btn = document.getElementById("toggleMarkets");
      if (marketsVisible) {
        marketLayer.addTo(map);
        btn.classList.add("active");
        renderMarkets();
      } else {
        map.removeLayer(marketLayer);
        btn.classList.remove("active");
      }
    }

    function renderMap(homes) {
      initMap();
      if (!map || !markerLayer) return;
      markerLayer.clearLayers();
      markersById = {};
      const bounds = [];
      const target = state.target || defaultState.target;
      const targetMarker = L.marker([target.lat, target.lng], {
        icon: markerIcon("target")
      }).addTo(markerLayer);
      targetMarker.bindTooltip("Faria Lima 3732", { direction: "top" });
      bounds.push([target.lat, target.lng]);

      homes.forEach((home, index) => {
        if (!home.lat || !home.lng) return;
        const marker = L.marker([home.lat, home.lng], {
          icon: markerIcon(scoreClass(home.score))
        }).addTo(markerLayer);
        marker.on("click", () => {
          selectedId = home.id;
          renderCards(rankedHomes());
          openDrawer(home);
        });
        markersById[home.id] = marker;
        bounds.push([home.lat, home.lng]);
      });

      document.getElementById("mapCount").textContent = String(homes.length);
      if (bounds.length > 1) map.fitBounds(bounds, { padding: [34, 34], maxZoom: 15 });
    }

    function markerIcon(className = "") {
      return L.divIcon({
        className: "",
        html: `<span class="pin ${className}"></span>`,
        iconSize: [28, 28],
        iconAnchor: [14, 28]
      });
    }

    function markerTooltip(home) {
      const photo = home.photos?.[0]?.url || "";
      return `
        <div class="tooltip-card">
          ${photo ? `<img src="${escapeAttr(photo)}" alt="">` : ""}
          <strong>${money.format(home.totalCost)}</strong>
          <span>${escapeHtml(home.neighborhood)} · ${number.format(home.targetDistanceKm)} km</span>
        </div>
      `;
    }

    function showMarkerPreview(id) {
      const marker = markersById[id];
      if (!marker) return;
      marker.setZIndexOffset(1000);
    }

    function hideMarkerPreview(id) {
      const marker = markersById[id];
      if (!marker) return;
      marker.setZIndexOffset(0);
    }

    function showRoutes(home) {
      if (!map || !home.lat || !home.lng) return;
      clearRoutes();
      const target = state.target || defaultState.target;
      const cacheKey = home.id;
      if (routeCache[cacheKey]) {
        drawRoutes(routeCache[cacheKey]);
        return;
      }
      const from = `${home.lng},${home.lat}`;
      const to = `${target.lng},${target.lat}`;
      const driveBase = "https://router.project-osrm.org/route/v1";
      const footBase = "https://routing.openstreetmap.de/routed-foot/route/v1";
      Promise.allSettled([
        fetch(`${driveBase}/driving/${from};${to}?overview=full&geometries=geojson`).then(r => r.json()),
        fetch(`${footBase}/foot/${from};${to}?overview=full&geometries=geojson`).then(r => r.json()),
        fetch(`${driveBase}/driving/${to};${from}?overview=full&geometries=geojson`).then(r => r.json())
      ]).then(([drivingResult, walkingResult, drivingReturnResult]) => {
        const result = { driving: null, walking: null, drivingReturn: null };
        if (drivingResult.status === "fulfilled" && drivingResult.value.code === "Ok" && drivingResult.value.routes[0]) {
          result.driving = { coords: drivingResult.value.routes[0].geometry.coordinates, duration: drivingResult.value.routes[0].duration };
        }
        if (walkingResult.status === "fulfilled" && walkingResult.value.code === "Ok" && walkingResult.value.routes[0]) {
          result.walking = { coords: walkingResult.value.routes[0].geometry.coordinates, duration: walkingResult.value.routes[0].duration };
        }
        if (drivingReturnResult.status === "fulfilled" && drivingReturnResult.value.code === "Ok" && drivingReturnResult.value.routes[0]) {
          result.drivingReturn = { coords: drivingReturnResult.value.routes[0].geometry.coordinates, duration: drivingReturnResult.value.routes[0].duration };
        }
        routeCache[cacheKey] = result;
        drawRoutes(result);
      });
    }

    function drawRoutes(result) {
      if (!map) return;
      clearRoutes();
      if (result.driving) {
        const latlngs = result.driving.coords.map(([lng, lat]) => [lat, lng]);
        routeLayerDriving = L.polyline(latlngs, { color: "#0f766e", weight: 5, opacity: 0.8 }).addTo(map);
      }
      if (result.walking) {
        const latlngs = result.walking.coords.map(([lng, lat]) => [lat, lng]);
        routeLayerWalking = L.polyline(latlngs, { color: "#2563eb", weight: 4, opacity: 0.85, dashArray: "8 6" }).addTo(map);
      }
      if (result.drivingReturn) {
        const latlngs = result.drivingReturn.coords.map(([lng, lat]) => [lat, lng]);
        routeLayerDrivingReturn = L.polyline(latlngs, { color: "#c2620a", weight: 5, opacity: 0.75, dashArray: "12 5" }).addTo(map);
      }
      updateRouteBadge(result);
    }

    function updateRouteBadge(result) {
      let badge = document.getElementById("routeInfoBadge");
      if (!badge) {
        badge = document.createElement("div");
        badge.id = "routeInfoBadge";
        badge.className = "route-info-badge";
        document.querySelector(".map-panel").appendChild(badge);
      }
      const fmtTime = (sec) => {
        const m = Math.round(sec / 60);
        return m < 60 ? `${m} min` : `${Math.floor(m / 60)}h ${m % 60 ? m % 60 + "min" : ""}`;
      };
      const carIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>`;
      const walkIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 4a1 1 0 1 0 2 0 1 1 0 0 0-2 0"/><path d="M7 20l2-8 3 3 2-5 2 10"/><path d="M5 20l2-10 3 3"/></svg>`;
      const parts = [];
      if (result.driving) parts.push(`<span class="route-badge-item drive">${carIcon} <span class="route-badge-dir">im→meta</span> ${fmtTime(result.driving.duration)}</span>`);
      if (result.drivingReturn) parts.push(`<span class="route-badge-item drive-return">${carIcon} <span class="route-badge-dir">meta→im</span> ${fmtTime(result.drivingReturn.duration)}</span>`);
      if (result.walking) parts.push(`<span class="route-badge-item walk">${walkIcon} ${fmtTime(result.walking.duration)}</span>`);
      badge.innerHTML = `<span class="route-badge-label">Percurso</span>` + parts.join(`<span class="route-badge-sep">·</span>`);
      badge.style.display = "flex";
    }

    function clearRoutes() {
      if (!map) return;
      if (routeLayerDriving) { map.removeLayer(routeLayerDriving); routeLayerDriving = null; }
      if (routeLayerWalking) { map.removeLayer(routeLayerWalking); routeLayerWalking = null; }
      if (routeLayerDrivingReturn) { map.removeLayer(routeLayerDrivingReturn); routeLayerDrivingReturn = null; }
      const badge = document.getElementById("routeInfoBadge");
      if (badge) badge.style.display = "none";
    }

    function openDrawer(home) {
      renderDetail(home);
      document.getElementById("drawerBackdrop").classList.add("open");
      document.getElementById("detailDrawer").classList.add("open");
    }

    function closeDrawer() {
      document.getElementById("drawerBackdrop").classList.remove("open");
      document.getElementById("detailDrawer").classList.remove("open");
      const extLink = document.getElementById("drawerExternalLink");
      if (extLink) extLink.style.display = "none";
    }

    function renderDetail(selected) {
      const panel = document.getElementById("detailPanel");
      if (!selected) {
        document.getElementById("detailTitle").textContent = "Detalhes do imóvel";
        panel.innerHTML = "";
        return;
      }
      document.getElementById("detailTitle").textContent = selected.title;
      const photos = selected.photos || [];
      const photoIndex = Math.min(photoIndexes[selected.id] || 0, Math.max(photos.length - 1, 0));
      photoIndexes[selected.id] = photoIndex;
      panel.innerHTML = `
        ${renderPhotoSlider(selected, photoIndex)}
        <div class="detail-list">
          ${detailRow("Nota", Math.round(selected.score))}
          <div class="detail-row"><span>Total</span><strong>${escapeHtml(money.format(selected.totalCost))}<small class="cost-delta ${deltaClass(selected)}">${escapeHtml(deltaLabel(selected))}</small></strong></div>
          ${detailRow("Atual", money.format(CURRENT_HOME.monthlyCost))}
          ${detailRow("Aluguel", money.format(selected.rent))}
          ${detailRow("Condomínio", money.format(selected.condo))}
          ${detailRow("IPTU", money.format(selected.iptu))}
          ${detailRow("Distância até meta", `${number.format(selected.targetDistanceKm)} km`)}
          ${(() => { if (!selected.lat || !selected.lng) return ""; const d = haversineKm(selected.lat, selected.lng, PLACES.pracaDoPovo.lat, PLACES.pracaDoPovo.lng); return detailRow("Praça do Povo", `${number.format(d)} km`); })()}
          ${(() => { const m = nearestMarket(selected); return m ? detailRow("Mercado mais próx.", `${m.name} · ${number.format(m.dist)} km`) : ""; })()}
          ${detailRow("Bairro", selected.neighborhood)}
          ${detailRow("Área", `${number.format(selected.area)} m²`)}
          ${detailRow("Quartos", selected.bedrooms)}
          ${detailRow("Banheiros", selected.bathrooms)}
          ${detailRow("Vagas", selected.parking)}
          ${selected.notes ? detailRow("Notas", selected.notes, "notes") : ""}
        </div>
      `;
      const extLink = document.getElementById("drawerExternalLink");
      if (extLink) { extLink.href = selected.url || "#"; extLink.style.display = selected.url ? "" : "none"; }
      const previous = panel.querySelector("[data-photo-action='prev']");
      const next = panel.querySelector("[data-photo-action='next']");
      if (previous) previous.addEventListener("click", () => changePhoto(selected, -1));
      if (next) next.addEventListener("click", () => changePhoto(selected, 1));
    }

    function detailRow(label, value, className = "") {
      const rowClass = className === "notes" ? "notes" : "";
      const valueClass = className !== "notes" ? className : "";
      return `<div class="detail-row ${rowClass}"><span>${escapeHtml(label)}</span><strong class="${escapeAttr(valueClass)}">${escapeHtml(value)}</strong></div>`;
    }

    function renderPhotoSlider(home, photoIndex) {
      const photos = home.photos || [];
      if (!photos.length) return "";
      const photo = photos[photoIndex];
      return `
        <div class="photo-slider">
          <img src="${escapeAttr(photo.url)}" alt="${escapeAttr(photo.subtitle || home.title)}">
          ${photos.length > 1 ? '<button class="slider-button prev" type="button" data-photo-action="prev" aria-label="Foto anterior">‹</button>' : ""}
          ${photos.length > 1 ? '<button class="slider-button next" type="button" data-photo-action="next" aria-label="Próxima foto">›</button>' : ""}
          <span class="photo-count">${photoIndex + 1}/${photos.length}</span>
        </div>
      `;
    }

    function changePhoto(home, direction) {
      const photos = home.photos || [];
      if (!photos.length) return;
      const current = photoIndexes[home.id] || 0;
      photoIndexes[home.id] = (current + direction + photos.length) % photos.length;
      renderDetail(home);
    }

    function scoreClass(score) {
      if (score >= 70) return "";
      if (score >= 45) return "mid";
      return "low";
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      })[char]);
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("\n", " ");
    }

    document.getElementById("toggleMarkets").addEventListener("click", toggleMarkets);
    document.getElementById("closeDrawer").addEventListener("click", closeDrawer);
    document.getElementById("drawerBackdrop").addEventListener("click", closeDrawer);
    document.getElementById("openCompare").addEventListener("click", openCompareDialog);
    document.getElementById("closeCompare").addEventListener("click", () => document.getElementById("compareDialog").close());
    document.getElementById("compareDialog").addEventListener("click", (event) => {
      if (event.target.id === "compareDialog") event.target.close();
    });
    document.querySelectorAll("[data-sort]").forEach((button) => {
      button.addEventListener("click", () => {
        sortBy = button.dataset.sort;
        render();
      });
    });

    render();
  </script>
</body>
</html>
